        @media(max-width:600px){

      `;

      function pct(a, b) { return Math.min(100, Math.round((a / b) * 100)); }
      function fmt(n) { return n >= 1000 ? Math.round(n).toLocaleString("no-NO") : n; }

      function KCard({ icon, val, unit, label, badge, bclass, color }) {
        return (
          <div className="kcard" style={{ borderTopColor: color || "#990AE3" }}>
            <span className="k-icon">{icon}</span>
            <span className="k-val">{fmt(val)}{unit && <span className="k-unit"> {unit}</span>}</span>
            <span className="k-lbl">{label}</span>
            {badge && <span className={`k-badge ${bclass}`}>{badge}</span>}
          </div>
        );
      }

      function Bar({ label, val, max, color }) {
        const w = Math.min(100, Math.round((val / max) * 100));
        return (
          <div className="bar-row">
            <div className="bar-lbl">{label}</div>
            <div className="bar-track">
              <div className="bar-fill" style={{ width: `${w}%`, background: color }}>{fmt(val)}</div>
            </div>
            <div className="bar-pct">{w}%</div>
          </div>
        );

      function ProfilePage({ month, sellerName, onBack }) {
        const d = DATA[month];
        if (!d) return null;

        const seller = d.sellers.find(s => s.name === sellerName);
        const prof = d.profiles[sellerName];
        if (!seller || !prof) return null;

        const maxG = Math.max(...d.sellers.map(s => s.gross)) || 1;
        const maxU = Math.max(...d.sellers.map(s => s.upgrades)) || 1;
        const maxT = Math.max(...d.sellers.map(s => s.trygg)) || 1;
        const maxF = Math.max(...d.sellers.map(s => s.forsikring)) || 1;

        return (

            <div className="footer">Telia Liertoppen · Selgerprofil</div>
          </div>

                <div className="yr">📅 2026</div>
                <div className="mgrid">
                  <MonthCard id="jan2026" d={DATA.jan2026} locked={false} />
                  <MonthCard id="feb2026" d={DATA.feb2026} locked={false} />
                  {["Mars","April","Mai","Juni","Juli","August","September","Oktober","November","Desember"].map((m, i) => (
                    <div key={i} className="mc locked" style={{ borderTopColor: "#9B7BB8" }}>
                      <div className="mc-head"><span>🔒</span><span className="badge bk">Ikke lastet</span></div>
                      <div className="mc-title">{m} 2026</div>
                    </div>
                  ))}
                </div>

                <div className="footer">Telia Liertoppen · Salgsportal 2026</div>
              </div>
            )}

            {(page === "jan2026" || page === "feb2026") && (
              <MonthPage id={page} onBack={() => goPage("home")} onProfile={showProfile} />
            )}

            {page === "y2025" && (
              <AnnualPage onBack={() => goPage("home")} onProfile={showProfile} />
            )}

            {page === "profile" && (
              <ProfilePage month={profMonth} sellerName={profSeller} onBack={() => goPage(profMonth)} />
            )}
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
